title: Querity
description: Open-source Java query builder for SQL and NoSQL.
theme: just-the-docs
url: "https://queritylib.github.io"
baseurl: ""
repository: queritylib/querity
logo: "/assets/img/querity-logo.jpg"
favicon_ico: "/assets/img/querity-logo.jpg"

nav_enabled: true
heading_anchors: true
search_enabled: true

search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  rel_url: true
  button: false
  focus_shortcut_key: "k"

aux_links:
  Querity on GitHub:
    - "https://github.com/queritylib/querity"
aux_links_new_tab: true

footer_content: "Querity documentation"

querity_version: 4.0.0

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - .jekyll-metadata
  - .bundle/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - '*.iml'
  - README.md
